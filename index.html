<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="manifest" href="manifest.json" />
	<title>プラカード</title>
	<style>
		body {
			margin: 0px;
			background-color: black;
			overflow: hidden;
		}
		#main {
			position: absolute;
			top: 0;
			left: 0;
			font-family: sans-serif;
			font-weight: 600;
			font-size: 100lvh;
			line-height: 100lvh;
			letter-spacing: -0.1em;
			margin: 0px;
			width: max-content;
			color: yellow;
			animation: 10s linear 0s infinite both slide-in;
		}
		@keyframes slide-in {
			from {
				transform: translateX(0);
			}
			to {
				transform: translateX(-50%);
			}
		}
		button {
			border: none;
			border-radius: 2em;
			padding: 0.5em 1.5em;
			font-family: sans-serif;
			background-color: #fffa;
			font-size: 0.8rem;
			line-height: 0.8rem;
		}
		input[type="text"], input[type="number"], textarea {
			background-color: #fffa;
			border: none;
			border-radius: 1em;
			padding: 0.5em 1em;
		}
		#settings {
			background-color: #ffffff88;
			backdrop-filter: blur(8px) saturate(150%);
			border: none;
			border-radius: 1em;
			box-shadow: 0px 4px 8px #0004;
			font-family: sans-serif;
		}
		#settingsButton {
			position: absolute;
			top: 5%;
			left: 5%;
			font-size: 1rem;
			opacity: 50%;
		}
		#form {
			display: grid;
			grid-template-columns: auto 1fr;
			column-gap: 0.5em;
			row-gap: 0.5em;
			margin: 1em auto;
		}
	</style>
</head>
<body>
	<div id="main" class="animated">
		ここにテキストを入力。ここにテキストを入力。
	</div>
	<button id="settingsButton" onclick="settings.showModal()">設定</button>
	<dialog id="settings">
		<div>
			作者：<a href="https://x.com/magicet_dev">Magicet</a>
			<br>
			ブラウザの共有メニューから「ホーム画面に追加」をすると全画面表示、オフライン使用ができるようになります。
		</div>

		<div id="form">
			<label for="duration">一周する時間(秒)</label>
			<input id="duration" type="number" placeholder="時間(秒)" value="10">
			<label for="bgcolor">背景の色</label>
			<input id="bgcolor" type="color">
			<label for="color">文字の色</label>
			<input id="color" type="color">
			<label for="text">表示するテキスト</label>
			<input id="text" type="text" placeholder="テキスト" value="ここにテキストを入力。">
			<div><input id="enableCustomStyle" type="checkbox"><label for="style">カスタムCSS</label></div>
			<textarea id="style" rows="5" cols="18" spellcheck="false">@import url('https://fonts.googleapis.com/css2?family=M+PLUS+U:wght@800&display=swap');
#main {
    font-family: "M PLUS U", sans-serif;
    background: linear-gradient(to right, red, orange, yellow, green, blue, purple, red, orange, yellow, green, blue, purple, red);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}</textarea>
		</div>
		
		<div>
			<button onclick="settings.close()">OK</button>
		</div>
	</dialog>
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker
				.register('sw.js')
				.then(function() { console.log("Service Worker Registered"); })
				.catch(function() { console.log("Service Worker Not Registered"); });
		}

		duration.addEventListener("change", (e) => {
			main.style.animationDuration = e.currentTarget.value + "s";
			console.log(e.currentTarget.value);
		})
		bgcolor.addEventListener("change", (e) => {
			document.body.style.backgroundColor = e.currentTarget.value;
			console.log(e.currentTarget.value);
		})
		color.addEventListener("change", (e) => {
			main.style.color = e.currentTarget.value;
			console.log(e.currentTarget.value);
		})
		text.addEventListener("input", (e) => {
			main.textContent = e.currentTarget.value + e.currentTarget.value;
			main.style.animationDuration = "0s";
			window.requestAnimationFrame((time1) => {
				window.requestAnimationFrame((time2) => {
					main.style.animationDuration = duration.value + "s";
				});
			});
			console.log(e.currentTarget.value);
		})
		enableCustomStyle.addEventListener("change", (e) => {
			if (e.currentTarget.checked) {
				customStyle.innerHTML = style.value;
			} else {
				customStyle.innerHTML = ""
			}
		})
		style.addEventListener("input", (e) => {
			if (enableCustomStyle.checked)
				customStyle.innerHTML = e.currentTarget.value;
			console.log(e.currentTarget.value);
		})
	</script>

	<style id="customStyle"></style>
</body>
</html>
